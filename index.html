<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Security headers are set at the server level via edge functions.
       Meta-tag CSP is not picked up by security scanners, so we rely on HTTP response headers instead. -->

  <!-- Preconnect hints for external APIs -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://ygckkrcmbwaswxxyjqds.supabase.co" />

  <title>Opportunity Radar – Scholarships, Hackathons, Internships & Global Opportunities</title>

  <meta name="description"
    content="Discover scholarships, hackathons, internships, fellowships, and competitions worldwide. Never miss important deadlines. Updated daily for students ages 13–30." />
  <meta name="keywords"
    content="scholarships, hackathons, internships, global opportunities, fellowships, student competitions, fully funded scholarships, international scholarships, bootcamps, tech internships" />
  <meta name="author" content="Opportunity Radar" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://opportunity-rader.vercel.app/" />

  <!-- Open Graph -->
  <meta property="og:title"
    content="Opportunity Radar – Scholarships, Hackathons, Internships & Global Opportunities" />
  <meta property="og:description"
    content="Discover scholarships, hackathons, internships, fellowships, and competitions worldwide. Never miss important deadlines." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://opportunity-rader.vercel.app/" />
  <meta property="og:image" content="https://opportunity-rader.vercel.app/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Opportunity Radar" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Opportunity Radar – Find Global Opportunities" />
  <meta name="twitter:description"
    content="Discover scholarships, hackathons, internships, fellowships, and competitions worldwide. Never miss a deadline." />
  <meta name="twitter:image" content="https://opportunity-rader.vercel.app/preview.png" />

  <!-- JSON-LD: WebSite + Sitelinks Search Box -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Opportunity Radar",
    "alternateName": "OpportunityRadar",
    "url": "https://opportunity-rader.vercel.app/",
    "description": "Discover scholarships, hackathons, internships, fellowships, bootcamps, and competitions worldwide for students ages 13–30.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://opportunity-rader.vercel.app/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
